environment: development
environmentCode:
name: ffc-pay-file-publisher
namespace: ffc-pay
workstream: ffc-pay
image: ffc-pay-file-publisher

labels: {}

appInsights:
  connectionString:

containerConfigMap:
  name: ffc-pay-file-publisher-config-map

containerSecret:
  name: ffc-pay-file-publisher-container-secret
  type: Opaque

deployment:
  priorityClassName: high

container:
  requestMemory: 150Mi
  requestCpu: 120m
  limitMemory: 150Mi
  limitCpu: 180m
  messageQueueHost: namespace.servicebus.windows.net
  sendTopicAddress: ffc-pay-file-send
  sendSubscriptionAddress: ffc-pay-file-publisher
  azureStorageAccountName: ffcpay
  azureStorageConnectionString: dummy
  azureStorageUseConnectionString: false
  azureStorageCreateContainers: false
  daxStorageConnectionString: myconnectionstring
  daxStorageShareName: integrations
  apFolder: AP
  arFolder: AR
  dpsFolder: dps
  eventsTopicAddress: ffc-pay-events
  useEvents: true
  filePublishEnabled: true

workloadIdentity: true

azureIdentity:
  clientID: not-a-real-clientID
  resourceID: not-a-real-resourceID

secretProviderClass:
  azure:
    keyvaultName: SNDFFCINFKV2001
    objects: # reading the secret from Azure Key Vault
      - objectName: appInsights-connectionString # secret name in Azure Key Vault
        objectType: secret
      - objectName: snd2-ffcpayDaxStorageConnectionString
        objectType: secret

  secretObjects: # creating a Kubernetes secret from the Azure Key Vault secrets
    - secretName: ffc-pay-file-publisher
      type: Opaque
      data:
        - objectName: appInsights-connectionString # secret name in Azure Key Vault
          key: APPINSIGHTS_CONNECTIONSTRING # the secret key in the Kubernetes secret and use in the application
        - objectName: snd2-ffcpayDaxStorageConnectionString
          key: DAX_STORAGE_CONNECTION_STRING