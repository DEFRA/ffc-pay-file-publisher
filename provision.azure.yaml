resources:
  identity: pay-file-publisher
  service_bus:
    topics:
      - name: ffc-pay-file-send
        defaultMessageTimeToLive: P3650D
        duplicateDetectionHistoryTimeWindow: PT10M30S
        requiresDuplicateDetection: true
        roles: 
        - name: receiver
        subscriptions:
          - name: ffc-pay-file-publisher
            deadLetteringOnMessageExpiration: true
            defaultMessageTimeToLive: P3650D
            lockDuration: PT5M
            maxDeliveryCount: 2000
      - name: ffc-pay-events
        defaultMessageTimeToLive: P3650D
        duplicateDetectionHistoryTimeWindow: PT10M30S
        requiresDuplicateDetection: true
        roles: 
        - name: sender
